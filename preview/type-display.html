<!doctype html>
<html lang="es" data-theme="dark">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 28px 32px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: 0; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); letter-spacing: 0.08em; text-transform: uppercase; min-width: 140px; }
  .sample { font-family: var(--font-display); font-weight: 800; line-height: 0.95; letter-spacing: -0.035em; color: var(--fg); }
</style>
</head>
<body>
  <div class="row">
    <span class="label">Display 1 · 120/0.95</span>
    <span class="sample" style="font-size:60px">Cero nube.</span>
  </div>
  <div class="row">
    <span class="label">Display 2 · 88/1.05</span>
    <span class="sample" style="font-size:44px;font-weight:700">Inteligencia clínica local</span>
  </div>
  <div class="row">
    <span class="label">Display 3 · 64/1.05</span>
    <span class="sample" style="font-size:32px;font-weight:700">El médico habla naturalmente</span>
  </div>
</body>
</html>
