<!doctype html>
<html lang="es" data-theme="dark">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 28px 32px; display: grid; gap: 14px; max-width: 520px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); letter-spacing: 0.04em; }
  input, select { background: var(--bg-card); color: var(--fg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-family: var(--font-sans); font-size: 14px; transition: border-color var(--dur-base) var(--ease-out), box-shadow var(--dur-base) var(--ease-out); }
  input:focus, select:focus { outline: 0; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.18); }
  input::placeholder { color: var(--fg-subtle); }
  .help { font-size: 12px; color: var(--fg-subtle); }
  .invalid { border-color: rgba(239,68,68,0.5); }
  .err { font-size: 12px; color: var(--red); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="field">
    <label>Institución</label>
    <input value="Clínica del Country" />
  </div>
  <div class="field">
    <label>Número de consultorios</label>
    <input class="invalid" value="0"/>
    <span class="err">Debe ser mayor a 1</span>
  </div>
</body>
</html>
