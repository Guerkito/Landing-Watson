<!doctype html>
<html lang="es" data-theme="dark">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 24px 32px; display: flex; gap: 48px; align-items: center; flex-wrap: wrap; }
  .stat { font-family: var(--font-display); font-weight: 800; font-size: 88px; line-height: 0.95; letter-spacing: -0.035em; color: var(--fg); font-variant-numeric: tabular-nums; }
  .unit { font-family: var(--font-mono); font-size: 14px; color: var(--fg-muted); letter-spacing: -0.01em; display: block; margin-top: 6px; }
  .blue { color: var(--blue); }
</style>
</head>
<body>
  <div>
    <div class="stat">2 h<span class="blue">/día</span></div>
    <span class="unit">Tiempo perdido digitando por médico</span>
  </div>
  <div>
    <div class="stat">1.5 min</div>
    <span class="unit">Tiempo por historia con WATSON</span>
  </div>
  <div>
    <div class="stat blue">+18 h</div>
    <span class="unit">Horas clínicas adicionales · 10 médicos</span>
  </div>
</body>
</html>
