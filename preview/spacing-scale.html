<!doctype html>
<html lang="es" data-theme="dark">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 32px; display: flex; align-items: flex-end; gap: 0; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
  .box { background: rgba(37,99,235,0.18); border: 1px solid rgba(37,99,235,0.4); border-radius: 4px; width: 100%; }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); letter-spacing: 0.04em; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg); }
</style>
</head>
<body>
  <div class="col"><div class="box" style="height:4px"></div><span class="px">4</span><span class="name">--s-1</span></div>
  <div class="col"><div class="box" style="height:8px"></div><span class="px">8</span><span class="name">--s-2</span></div>
  <div class="col"><div class="box" style="height:12px"></div><span class="px">12</span><span class="name">--s-3</span></div>
  <div class="col"><div class="box" style="height:16px"></div><span class="px">16</span><span class="name">--s-4</span></div>
  <div class="col"><div class="box" style="height:24px"></div><span class="px">24</span><span class="name">--s-6</span></div>
  <div class="col"><div class="box" style="height:32px"></div><span class="px">32</span><span class="name">--s-8</span></div>
  <div class="col"><div class="box" style="height:48px"></div><span class="px">48</span><span class="name">--s-12</span></div>
  <div class="col"><div class="box" style="height:64px"></div><span class="px">64</span><span class="name">--s-16</span></div>
  <div class="col"><div class="box" style="height:96px"></div><span class="px">96</span><span class="name">--s-24</span></div>
  <div class="col"><div class="box" style="height:128px"></div><span class="px">128</span><span class="name">--s-32</span></div>
</body>
</html>
