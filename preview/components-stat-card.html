<!doctype html>
<html lang="es" data-theme="dark">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.06); }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); }
  .stat { font-family: var(--font-display); font-weight: 800; font-size: 44px; line-height: 1; letter-spacing: -0.035em; color: var(--fg); margin-top: 14px; font-variant-numeric: tabular-nums; }
  .label { font-size: 13px; color: var(--fg-muted); margin-top: 8px; }
  .blue { color: var(--blue); }
  .delta { font-family: var(--font-mono); font-size: 12px; color: var(--green); margin-top: 14px; display: inline-flex; gap: 4px; align-items: center; }
</style>
</head>
<body>
  <div class="card">
    <span class="eyebrow">Tiempo por historia</span>
    <div class="stat">1.5 <span class="blue" style="font-size:24px">min</span></div>
    <div class="delta">↓ 75 % vs. baseline</div>
  </div>
  <div class="card">
    <span class="eyebrow">Pacientes/médico/día</span>
    <div class="stat">30–32</div>
    <div class="label">Antes: 25 — capacidad ampliada sin contratar.</div>
  </div>
</body>
</html>
