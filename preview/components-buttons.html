<!doctype html>
<html lang="es" data-theme="dark">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 32px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  button { font-family: var(--font-sans); font-size: 14px; font-weight: 500; padding: 10px 18px; border-radius: 8px; cursor: pointer; transition: background var(--dur-base) var(--ease-out), color var(--dur-base) var(--ease-out), border-color var(--dur-base) var(--ease-out); display: inline-flex; align-items: center; gap: 8px; line-height: 1; }
  .primary { background: var(--blue); color: #fff; border: 0; box-shadow: inset 0 1px 0 rgba(255,255,255,0.18); }
  .primary:hover { background: color-mix(in oklch, var(--blue), white 6%); }
  .secondary { background: transparent; color: var(--fg); border: 1px solid var(--border); }
  .secondary:hover { border-color: var(--border-hover); }
  .ghost { background: transparent; color: var(--fg-muted); border: 0; }
  .ghost:hover { color: var(--fg); }
  .destructive { background: transparent; color: var(--red); border: 1px solid rgba(239,68,68,0.32); }
  .lg { padding: 14px 22px; font-size: 16px; border-radius: 10px; }
  svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
  <button class="primary lg">Solicitar demo <svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg></button>
  <button class="primary">Continuar</button>
  <button class="secondary">Ver cómo funciona</button>
  <button class="ghost">Cancelar</button>
  <button class="destructive">Eliminar nodo</button>
</body>
</html>
