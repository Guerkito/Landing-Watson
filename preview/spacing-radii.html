<!doctype html>
<html lang="es" data-theme="dark">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 24px; display: flex; gap: 14px; align-items: center; justify-content: space-around; }
  .demo { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 88px; height: 88px; background: var(--bg-card); border: 1px solid var(--border); box-shadow: inset 0 1px 0 rgba(255,255,255,0.06); }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); letter-spacing: 0.04em; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg); }
</style>
</head>
<body>
  <div class="demo"><div class="box" style="border-radius:4px"></div><span class="name">--r-xs · 4</span><span class="label">inputs</span></div>
  <div class="demo"><div class="box" style="border-radius:8px"></div><span class="name">--r-sm · 8</span><span class="label">botón · badge</span></div>
  <div class="demo"><div class="box" style="border-radius:12px"></div><span class="name">--r-md · 12</span><span class="label">card</span></div>
  <div class="demo"><div class="box" style="border-radius:16px"></div><span class="name">--r-lg · 16</span><span class="label">panel</span></div>
  <div class="demo"><div class="box" style="border-radius:24px"></div><span class="name">--r-xl · 24</span><span class="label">hero</span></div>
  <div class="demo"><div class="box" style="border-radius:999px;width:120px"></div><span class="name">--r-full</span><span class="label">chip</span></div>
</body>
</html>
